<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SigmX Promo</title>
  <style>
    :root {
      --bg: #070a10;
      --panel: #0d121c;
      --panel2: #111827;
      --line: #202a3a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --red: #fb3f65;
      --green: #22c55e;
      --gold: #f5b942;
      --blue: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(circle at 82% 12%, rgba(56,189,248,.16), transparent 30%),
        radial-gradient(circle at 18% 82%, rgba(34,197,94,.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }
    .scene { width: 1920px; height: 1080px; padding: 42px 58px; position: relative; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
    .brand { display:flex; align-items:center; gap:16px; }
    .logo { width:52px; height:52px; border-radius:14px; background:linear-gradient(135deg,#ef4444,#7c2d12); display:grid; place-items:center; font-weight:900; }
    .brand h1 { margin:0; font-size:30px; letter-spacing:.2px; }
    .brand p { margin:5px 0 0; color:var(--muted); font-size:15px; }
    .date { color:var(--muted); font-size:18px; }
    .grid { display:grid; gap:20px; }
    .cols-4 { grid-template-columns: repeat(4, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    .main { display:grid; grid-template-columns: 1.18fr .82fr; gap:24px; }
    .card { background:rgba(13,18,28,.88); border:1px solid var(--line); border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.22); }
    .card-h { padding:18px 22px; border-bottom:1px solid var(--line); color:#dbeafe; font-weight:700; font-size:20px; display:flex; justify-content:space-between; align-items:center; }
    .card-b { padding:22px; }
    .hero { height:760px; display:flex; flex-direction:column; justify-content:center; padding:52px; }
    .eyebrow { color:var(--gold); font-weight:700; font-size:24px; margin-bottom:18px; }
    .title { font-size:68px; line-height:1.08; font-weight:900; letter-spacing:-1px; margin:0; }
    .subtitle { margin-top:22px; color:#cbd5e1; font-size:28px; line-height:1.45; max-width:1100px; }
    .pill { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:#162033; border:1px solid #26354d; color:#cbd5e1; font-size:15px; }
    .metric { padding:22px; }
    .metric .label { color:var(--muted); font-size:16px; }
    .metric .value { font-size:44px; margin-top:8px; font-weight:900; }
    .up { color:var(--red); }
    .down { color:var(--green); }
    .gold { color:var(--gold); }
    .blue { color:var(--blue); }
    .line-row { display:flex; justify-content:space-between; align-items:center; gap:18px; padding:15px 0; border-bottom:1px solid rgba(148,163,184,.14); font-size:19px; }
    .line-row:last-child { border-bottom:0; }
    .small { color:var(--muted); font-size:15px; }
    .bars { display:flex; flex-direction:column; gap:14px; }
    .bar { display:grid; grid-template-columns: 130px 1fr 70px; align-items:center; gap:14px; font-size:17px; }
    .track { height:14px; background:#172033; border-radius:999px; overflow:hidden; }
    .fill { height:100%; background:linear-gradient(90deg,var(--red),#f97316); border-radius:999px; }
    .flow { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:36px; }
    .step { padding:22px; min-height:205px; position:relative; overflow:hidden; }
    .step .time { color:var(--gold); font-size:23px; font-weight:900; }
    .step h3 { margin:14px 0 10px; font-size:28px; }
    .step p { margin:0; color:#cbd5e1; font-size:18px; line-height:1.45; }
    .caption { position:absolute; left:0; right:0; bottom:38px; text-align:center; font-size:42px; font-weight:900; text-shadow:0 4px 28px rgba(0,0,0,.75); }
    .caption span { background:rgba(0,0,0,.48); padding:14px 30px; border-radius:10px; }
    .terminal { background:#05070b; border:1px solid #1f2937; border-radius:12px; padding:22px; font-family:Consolas, monospace; color:#cbd5e1; font-size:18px; line-height:1.65; min-height:340px; }
    .glow { box-shadow:0 0 0 1px rgba(245,185,66,.22), 0 0 42px rgba(245,185,66,.10); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const scenes = [

      },
      {

          </div>`
      },
      {
        cap: "收盘复盘：把今天的判断沉淀成明天的清单",
        html: `
          <div class="main">
            <div class="card"><div class="card-h">收盘复盘</div><div class="card-b">
              <div class="line-row"><b>推荐数量</b><span>早盘 5 · 尾盘 5</span></div>

              <div class="line-row"><b>命中率</b><span class="up">64%</span></div>
              <div class="line-row"><b>明日观察</b><span>算力、机器人、半导体设备</span></div>
            </div></div>
            <div class="card"><div class="card-h">复盘问题</div><div class="card-b">
              <div class="line-row"><span>推荐是否跑赢市场广度？</span><b>是</b></div>
              <div class="line-row"><span>尾盘强势股是否有真实承接？</span><b>待确认</b></div>
              <div class="line-row"><span>明日优先观察哪些事件扩散？</span><b>已生成</b></div>
            </div></div>
          </div>
          <div class="terminal" style="margin-top:24px">
            > AI 收盘复盘完成<br/>
            - 市场广度：上涨家数占优，题材扩散仍在<br/>

      {

            <div class="card metric"><div class="label">交易日阶段</div><div class="value">4</div></div>
            <div class="card metric"><div class="label">通知推送</div><div class="value">3</div></div>
          </div>`
      },
      {
        cap: "SigmX：让每个交易日都有结构、有证据、有复盘",
        html: `
          <div class="hero card glow">
            <div class="eyebrow">SigmX</div>
            <h2 class="title">AI 盘面决策平台</h2>
            <div class="subtitle">从早盘内参、盘中监控、尾盘策略到收盘复盘，把交易流程变成可追踪、可沉淀、可复用的 AI 工作台。</div>

              <span class="pill">A 股投研</span>

              <span class="pill">风险提示</span>
            </div>
          </div>`
      }
    ];
    const scene = Number(new URLSearchParams(location.search).get("scene") || 0);
    const item = scenes[Math.max(0, Math.min(scene, scenes.length - 1))];
    document.getElementById("root").innerHTML = `
      <div class="scene">
        <div class="topbar">
          <div class="brand">
            <div class="logo">涨</div>
            <div><h1>SigmX</h1><p>AI Trading Intelligence</p></div>
          </div>
          <div class="date">2026 · AI 盘面工作流</div>
        </div>
        ${item.html}
        <div class="caption"><span>${item.cap}</span></div>
      </div>`;
  </script>
</body>
</html>
